# nginx SSL passthrough (no TLS termination here).
#
# We use the stream module instead of http {}. nginx never decrypts the
# traffic: it peeks at the TLS ClientHello (ssl_preread) for routing only,
# then forwards the raw encrypted bytes to the Go service, which terminates
# TLS itself.
#
# proxy_protocol on; makes nginx prepend a PROXY protocol header to the
# upstream connection so the Go service can recover the real client IP.

worker_processes auto;

events {
    worker_connections 1024;
}

stream {
    log_format passthrough '$remote_addr [$time_local] '
                           'proto=$ssl_preread_protocol sni=$ssl_preread_server_name '
                           'sent=$bytes_sent recv=$bytes_received';
    access_log /var/log/nginx/stream.log passthrough;

    # The Go service. proxy_protocol is set on the proxy_pass below.
    upstream go_backend {
        server app:8443;
    }

    # Enables $ssl_preread_* variables (reads ClientHello without terminating).
    map $ssl_preread_server_name $upstream {
        default go_backend;
        # Route by SNI here if you add more backends, e.g.:
        # api.example.com   go_backend;
    }

    server {
        listen 443;

        # Required to populate $ssl_preread_server_name / _protocol.
        ssl_preread on;

        # Forward the real client address to the backend via PROXY protocol.
        proxy_protocol on;

        proxy_pass $upstream;

        proxy_connect_timeout 5s;
        proxy_timeout 60s;
    }
}
